<!DOCTYPE html>
<html>
<head>
    <title>cURL Debug Tool</title>
    <style>
        body {
            font-family: monospace;
            margin: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #2d2d2d;
            color: #d4d4d4;
            border: 1px solid #555;
            padding: 10px;
            font-family: monospace;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px 0;
        }
        button:hover {
            background: #1177bb;
        }
        .result {
            background: #2d2d2d;
            border: 1px solid #555;
            padding: 15px;
            margin: 10px 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        h3 { color: #569cd6; }
    </style>
</head>
<body>
    <h1>🔍 cURL Parser Debugger</h1>
    <p>Paste your cURL command here to see exactly what's being parsed:</p>

    <textarea id="curl" placeholder="Paste your cURL command here..."></textarea>
    <br>
    <button onclick="testParse()">Parse & Show Details</button>

    <div id="results"></div>

    <script>
        async function testParse() {
            const curl = document.getElementById('curl').value;
            const resultsDiv = document.getElementById('results');

            if (!curl.trim()) {
                resultsDiv.innerHTML = '<div class="result error">Please paste a cURL command first!</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="result">Parsing...</div>';

            try {
                const response = await fetch('/api/debug-curl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ curl })
                });

                const data = await response.json();

                let html = '<h3>📊 cURL Analysis:</h3>';
                html += '<div class="result">';
                html += `<div class="success">✓ Received ${data.received_length} characters</div>`;
                html += `<div class="${data.has_data_flag ? 'success' : 'error'}">`;
                html += data.has_data_flag ? '✓ --data flag found' : '✗ NO --data flag found!';
                html += '</div>';
                html += `<div class="warning">Contains ${data.newline_count} newlines</div>`;
                html += '</div>';

                html += '<h3>📝 Full cURL Command:</h3>';
                html += `<div class="result">${escapeHtml(data.curl_preview)}</div>`;

                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = `<div class="result error">Error: ${error.message}</div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
